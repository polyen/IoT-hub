# DVC params for `dvc repro` — central place for hyperparameters.
# Override per-run via `dvc exp run --set-param train.fire_smoke.epochs=100`.

train:
  fire_smoke:
    # 3-class mixed dataset (person/fire/smoke). Build with:
    #   uv run python -m training.datasets.prepare_mixed
    # Fall back to datasets/fire_smoke/data.yaml for the legacy 2-class run.
    data: datasets/fire_smoke_mixed/data.yaml
    base_model: yolo26n.pt
    epochs: 50
    imgsz: 640
    batch: 8
    lr: 0.001
    device: mps
    mlflow_uri: http://localhost:5001
    # Output sub-dir under runs/fire_smoke/ + MLflow run name. Override per
    # architecture so an A/B comparison doesn't overwrite the same dir, e.g.:
    #   dvc exp run -S train.fire_smoke.base_model=yolo26n.pt -S train.fire_smoke.name=yolo26n
    name: train

mining:
  db_url: postgresql+asyncpg://iothub:iothub@localhost:5432/iothub
  days: 30
  max_per_tag: 100
  # Maximum Event.tier to include (0=T0 raw/sensitive edge-only, 1=T1 personal
  # events, 2=T2 aggregated, 3=T3 operational). Default 1 keeps the training
  # loop conservative: T0 raw frames are excluded unless explicitly overridden.
  max_tier: 1

# Intent classifier (T6.x)
intent_classifier:
  dataset:
    # MASSIVE locale (Amazon, arXiv 2204.08582).  uk-UA = Ukrainian.
    massive_locale: uk-UA
    # Cap synthetic examples per class so the model doesn't overfit on the
    # Cartesian product (one verb × room × device can blow up to thousands).
    synthetic_per_class: 200
    val_size: 0.1
    test_size: 0.1
    seed: 42
  train:
    # multilingual-e5-small (118M params) — good UA support, ~120 MB INT8.
    # Alternatives: intfloat/multilingual-e5-base (270M, +1-2 pp accuracy);
    # google/embeddinggemma-300m (already in repo via router.py, ONNX-ready).
    base_model: intfloat/multilingual-e5-small
    num_iterations: 20
    num_epochs: 1
    batch_size: 16
    learning_rate: 2.0e-5
    mlflow_uri: http://localhost:5001
