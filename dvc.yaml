# DVC pipeline (T0.7) — dataset versioning + model training stages.
#
# Datasets are tracked via `dvc add` (which creates the `.dvc` files committed
# to git, with the actual blobs synced to the configured gdrive remote).
# The stages below describe reproducible commands; run `dvc repro` to execute.
#
# T0 data (`datasets/person_reid/`) is excluded from the remote — see
# `.dvcignore` and `scripts/check_datasets.py` (pre-commit hook).

stages:
  # ---------------------------------------------------------------------------
  # Wake-word training (T2.6) — runs on a CPU laptop in ~30 minutes.
  # ---------------------------------------------------------------------------
  train_wake_word:
    cmd: >
      uv run python -m training.wake_word.train_oww
      --samples-dir datasets/voice/wake_word
      --out models/versions/wake_word_xei_xata.onnx
    deps:
      - datasets/voice/wake_word
      - training/wake_word/train_oww.py
    outs:
      - models/versions/wake_word_xei_xata.onnx

  # ---------------------------------------------------------------------------
  # Fire/smoke fine-tune (T4.3) — runs on Colab / Kaggle GPU.
  # MLflow tracking server URL is read from MLFLOW_URI env (see params).
  # ---------------------------------------------------------------------------
  train_fire_smoke:
    cmd: >
      uv run python -m training.fire_smoke.train
      --data ${train.fire_smoke.data}
      --base-model ${train.fire_smoke.base_model}
      --epochs ${train.fire_smoke.epochs}
      --imgsz ${train.fire_smoke.imgsz}
      --batch ${train.fire_smoke.batch}
      --lr ${train.fire_smoke.lr}
      --device ${train.fire_smoke.device}
      --mlflow-uri ${train.fire_smoke.mlflow_uri}
      --name ${train.fire_smoke.name}
      --resume
    deps:
      - datasets/fire_smoke_mixed
      - training/fire_smoke/train.py
    params:
      - train.fire_smoke
    outs:
      - runs/fire_smoke:
          persist: true

  # ---------------------------------------------------------------------------
  # Hard-negative mining (T4.2) — runs only on edge (T0 frame access).
  # Produces the next feedback_v{N}/ delta dataset.
  #
  # No longer frozen: the stage is the entry point of the MLOps feedback loop
  # (mining → re-train → shadow eval → promote → rollback). The
  # ``always_changed: true`` flag keeps dvc from caching the result since the
  # input is the live Postgres FeedbackEvent table, not a tracked file.
  # ---------------------------------------------------------------------------
  mine_hard_negatives:
    cmd: >
      uv run python -m training.mining
      --db-url ${mining.db_url}
      --days ${mining.days}
      --max-per-tag ${mining.max_per_tag}
      --max-tier ${mining.max_tier}
      --out-base datasets/fire_smoke
    deps:
      - training/mining.py
    params:
      - mining
    always_changed: true

  # ---------------------------------------------------------------------------
  # Evaluation (T5.1) — wraps `make evaluate`.
  # ---------------------------------------------------------------------------
  # Intent classifier (T6.x) — SetFit on multilingual-e5-small.
  # Produces ONNX INT8 used by hub/edge/agent/intent_classifier.py.
  # ---------------------------------------------------------------------------
  prepare_intent_dataset:
    cmd: >
      uv run python -m training.intent_classifier.prepare_dataset
      --out-dir datasets/intent_classifier
      --massive-locale ${intent_classifier.dataset.massive_locale}
      --synthetic-per-class ${intent_classifier.dataset.synthetic_per_class}
      --val-size ${intent_classifier.dataset.val_size}
      --test-size ${intent_classifier.dataset.test_size}
      --seed ${intent_classifier.dataset.seed}
    deps:
      - training/intent_classifier/prepare_dataset.py
      - training/intent_classifier/intents.py
      - training/intent_classifier/templates.py
    params:
      - intent_classifier.dataset
    outs:
      - datasets/intent_classifier/train.jsonl
      - datasets/intent_classifier/val.jsonl
      - datasets/intent_classifier/test.jsonl
      - datasets/intent_classifier/stats.json

  train_intent_classifier:
    cmd: >
      uv run python -m training.intent_classifier.train
      --data-dir datasets/intent_classifier
      --out-dir models/intent_classifier
      --base-model ${intent_classifier.train.base_model}
      --num-iterations ${intent_classifier.train.num_iterations}
      --num-epochs ${intent_classifier.train.num_epochs}
      --batch-size ${intent_classifier.train.batch_size}
      --learning-rate ${intent_classifier.train.learning_rate}
      --mlflow-uri ${intent_classifier.train.mlflow_uri}
    deps:
      - datasets/intent_classifier/train.jsonl
      - datasets/intent_classifier/val.jsonl
      - datasets/intent_classifier/test.jsonl
      - training/intent_classifier/train.py
      - training/intent_classifier/intents.py
    params:
      - intent_classifier.train
    outs:
      - models/intent_classifier/checkpoint:
          persist: true
      - models/intent_classifier/metadata.json
    metrics:
      - reports/intent_classifier_metrics.json

  export_intent_onnx:
    cmd: >
      uv run python -m training.intent_classifier.convert_to_onnx
      --checkpoint models/intent_classifier/checkpoint
      --out-dir models/intent_classifier
    deps:
      - models/intent_classifier/checkpoint
      - training/intent_classifier/convert_to_onnx.py
    outs:
      - models/intent_classifier/model.int8.onnx
      - models/intent_classifier/tokenizer
      - models/intent_classifier/classifier_head.npz

  # ---------------------------------------------------------------------------
  evaluate:
    cmd: make evaluate
    deps:
      - training/evaluation
    outs:
      - materials/evaluation_results
