name: CD — Edge

on:
  push:
    branches: [main]
    paths:
      - "hub/edge/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/iot-hub-edge

jobs:
  build-push:
    name: Build & push edge image (arm64)
    runs-on: ubuntu-latest
    environment: edge
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (linux/arm64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hub/edge/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Edge uses pull-based deployment via Watchtower running on the RPi5.
  # After the image is pushed, Watchtower polls GHCR and pulls automatically.
  # This job exists so the workflow fails visibly if the push step fails.
  notify:
    name: Notify edge deploy
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Image available for Watchtower
        run: |
          echo "Edge image pushed: ghcr.io/${{ env.IMAGE_NAME }}"
          echo "Watchtower on RPi5 will pull it on the next poll cycle."
          echo "SHA tag: sha-$(echo '${{ github.sha }}' | head -c 7)"
