name: Compile HEF

# NOTE: HEF compilation runs locally via scripts/deploy-model.sh using the
# Hailo AI Software Suite Docker image (17.5 GB — too large for CI runners).
#
# This workflow is kept as a future reference for when a self-hosted runner
# with the Hailo DFC image pre-loaded becomes available.
#
# Current deployment flow (local):
#   scripts/deploy-model.sh --model fire_smoke --version v1.0
#   → ONNX export → docker run hailo_dfc → HEF → oras push GHCR
#   → RPi model-puller promotes within 5 min

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model name (e.g. fire_smoke)"
        required: true
        type: string
      version:
        description: "Model version tag (e.g. v1.4)"
        required: true
        type: string

jobs:
  notice:
    runs-on: ubuntu-22.04
    steps:
      - name: Deployment via local script
        run: |
          echo "## HEF compilation runs locally" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run on your laptop:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "scripts/deploy-model.sh --model ${{ github.event.inputs.model }} --version ${{ github.event.inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
