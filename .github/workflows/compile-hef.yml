name: Compile HEF

# Triggered manually after training: export ONNX, dvc push, then run this workflow.
#
# User workflow on laptop/Colab:
#   1. train → export ONNX → cp best.onnx models/onnx/{model}_{version}.onnx
#   2. dvc add models/onnx/{model}_{version}.onnx && dvc push
#   3. gh workflow run compile-hef.yml -f model=fire_smoke -f version=v1.4
#
# The RPi model-puller (systemd timer) detects the new GHCR tag and promotes
# the model automatically within 5 minutes — no manual step on the device.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model name (e.g. fire_smoke)"
        required: true
        type: string
      version:
        description: "Model version tag (e.g. v1.4)"
        required: true
        type: string

jobs:
  compile:
    runs-on: ubuntu-22.04
    env:
      MODEL_NAME: ${{ github.event.inputs.model }}
      MODEL_VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dev deps
        run: uv sync --extra dev --frozen

      - name: Write GDrive OAuth credentials
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
        run: |
          mkdir -p "/home/runner/.cache/pydrive2fs/${GDRIVE_CLIENT_ID}"
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' \
            > "/home/runner/.cache/pydrive2fs/${GDRIVE_CLIENT_ID}/default.json"

      - name: Pull ONNX from DVC (GDrive)
        run: |
          uv run dvc pull "models/onnx/${MODEL_NAME}_${MODEL_VERSION}.onnx.dvc"
          echo "onnx_path=models/onnx/${MODEL_NAME}_${MODEL_VERSION}.onnx" >> "$GITHUB_ENV"

      - name: Pull calibration subset via DVC
        run: uv run dvc pull "datasets/${MODEL_NAME}/calibration/" --run-cache

      - name: Cache Hailo DFC Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.hailo-dfc-cache
          key: hailo-dfc-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: hailo-dfc-${{ runner.os }}-

      - name: Compile ONNX → HEF via Hailo DFC
        run: |
          mkdir -p hef_output
          docker run --rm \
            -v "$(pwd)/models/onnx:/onnx:ro" \
            -v "$(pwd)/hef_output:/hef_output" \
            -v "$(pwd)/training:/training:ro" \
            hailo/hailo_dfc:latest \
            python /training/convert_to_hef.py \
              --onnx "/onnx/${MODEL_NAME}_${MODEL_VERSION}.onnx" \
              --out /hef_output \
              --model-name "${MODEL_NAME}_${MODEL_VERSION}" \
              --ci

      - name: Install oras CLI
        run: |
          ORAS_VERSION="1.2.3"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          sudo mv oras /usr/local/bin/oras

      - name: Push HEF as OCI artifact to GHCR
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          echo "${GHCR_PAT}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          HEF_TAG="ghcr.io/${{ github.repository_owner }}/iot-hub-models:${MODEL_NAME}-${MODEL_VERSION}"
          for hef in hef_output/*.hef; do
            oras push "${HEF_TAG}" "${hef}:application/octet-stream"
            echo "Pushed: ${HEF_TAG}"
          done

      - name: Summary
        run: |
          echo "### HEF Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Model:** \`${MODEL_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${MODEL_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **GHCR tag:** \`ghcr.io/${{ github.repository_owner }}/iot-hub-models:${MODEL_NAME}-${MODEL_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "RPi \`model-puller\` will detect and promote within 5 minutes." >> "$GITHUB_STEP_SUMMARY"
