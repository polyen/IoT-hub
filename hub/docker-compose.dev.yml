name: iot-hub-edge
# Dev override: exposes plain MQTT port 1883 on the host so mock_sensors
# running on the dev machine can publish without mTLS.
# ca-server (port 8888) lives in docker-compose.edge.yml with profiles: [dev].
# Usage:
#   make up-edge-dev   →  docker-compose.edge.yml + this file + --profile dev
# Never use in production — 1883 has no auth outside the Docker network.
services:
  mosquitto:
    ports:
      - "1883:1883"
