# =============================================================================
# Mosquitto configuration — IoT Hub edge broker
# T0.6 baseline; mTLS section activated in T3.1
# =============================================================================

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_type subscribe
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ---------------------------------------------------------------------------
# Listener 1883 — plain TCP (internal network only)
# In production this port must NOT be exposed to the host network.
# docker-compose.edge.yml binds it to 127.0.0.1 in T3.1.
# ---------------------------------------------------------------------------
listener 1883

# Password-file authentication (generated by scripts/gen-mqtt-certs.sh or
# manually: mosquitto_passwd -c /mosquitto/config/passwd <username>)
password_file /mosquitto/config/passwd
allow_anonymous false

# ACL — per-topic access rules
acl_file /mosquitto/config/acl.conf

# Include bridge config (commented out — activated in T3.5)
# include_dir /mosquitto/config/conf.d

# ---------------------------------------------------------------------------
# Listener 8883 — mTLS (activated in T3.1)
# Uncomment after running scripts/gen-mqtt-certs.sh
# ---------------------------------------------------------------------------
# listener 8883
# protocol mqtt
# cafile   /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/broker.crt
# keyfile  /mosquitto/certs/broker.key
# require_certificate true
# use_identity_as_username true
