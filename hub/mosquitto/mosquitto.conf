# =============================================================================
# Mosquitto configuration — IoT Hub edge broker
# T0.6 baseline; mTLS section activated in T3.1
# =============================================================================

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_type subscribe
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ---------------------------------------------------------------------------
# Listener 1883 — plain TCP for the iot-internal Docker network only.
# Network isolation is the security boundary on this listener; do NOT expose
# port 1883 to the host (drop the "1883:1883" mapping in docker-compose.edge.yml
# in production). Cross-host clients (ESP32, VPS) MUST use 8883 with mTLS.
# ---------------------------------------------------------------------------
listener 1883 0.0.0.0
allow_anonymous true

# ACL — per-topic access rules. Activated by default; the "anonymous" pattern
# below grants services on the iot-internal network full access on 1883, while
# 8883 mTLS clients are matched against named "user <cn>" blocks.
acl_file /mosquitto/config/acl.conf

# Include bridge config (T3.4 — edge → VPS)
include_dir /mosquitto/config/conf.d

# ---------------------------------------------------------------------------
# Listener 8883 — mTLS (T3.1)
# Run scripts/gen-mqtt-certs.sh before starting the broker.
# ---------------------------------------------------------------------------
listener 8883
protocol mqtt
cafile   /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/broker.crt
keyfile  /mosquitto/config/certs/broker.key
require_certificate true
use_identity_as_username true
