# =============================================================================
# Mosquitto ACL — IoT Hub edge broker
# Format: https://mosquitto.org/man/mosquitto-conf-5.html (acl_file)
#
# Topic prefix convention (PROJECT.md §13):
#   iot/<room>/<device>/<measurement>
#   iot/cmd/<room>/<device>/<action>
#   iot/alert/<type>/<room>
#   iot/agent/<intent|result>
#   $SYS/#   — broker stats (read-only)
#
# Tiers:
#   T0 — public aggregate (all clients read)
#   T1 — non-sensitive telemetry
#   T2 — sensitive (edge-only)
#   T3 — private (backend service only, never MQTT)
# =============================================================================

# ---------------------------------------------------------------------------
# Backend service account — full access
# ---------------------------------------------------------------------------
user backend
topic readwrite #

# ---------------------------------------------------------------------------
# Edge CV agent
# ---------------------------------------------------------------------------
user cv-agent
topic readwrite iot/alert/#
topic readwrite iot/cv/#
topic read      iot/cmd/cv/#
topic read      $SYS/broker/uptime

# ---------------------------------------------------------------------------
# Voice / LLM agent
# ---------------------------------------------------------------------------
user llm-agent
topic readwrite iot/agent/#
topic readwrite iot/cmd/#
topic read      iot/#
topic read      $SYS/broker/uptime

# ---------------------------------------------------------------------------
# ESP32 / sensor devices (per-device accounts created at provisioning time)
# Pattern: device-<room>-<id>
# ---------------------------------------------------------------------------
# Example device in living_room — replace with real device accounts in T1.x
user device-living-001
topic write iot/living_room/device-001/#
topic read  iot/cmd/living_room/device-001/#

user device-bedroom-001
topic write iot/bedroom/device-001/#
topic read  iot/cmd/bedroom/device-001/#

# ---------------------------------------------------------------------------
# Monitoring (Prometheus MQTT exporter — read-only $SYS)
# ---------------------------------------------------------------------------
user monitoring
topic read $SYS/#

# ---------------------------------------------------------------------------
# VPS bridge account (activated in T3.5)
# Only T0/T1 topics are forwarded; T2+ topics are intentionally excluded.
# ---------------------------------------------------------------------------
user vps-bridge
topic read  iot/alert/#
topic read  iot/+/+/temperature
topic read  iot/+/+/humidity
topic read  iot/+/+/motion
topic write iot/cmd/#
