# =============================================================================
# Mosquitto ACL — IoT Hub edge broker
# Two protection planes:
#   1883 (iot-internal Docker net): anonymous clients (backend, cv, llm, agent)
#                                    granted full access — net isolation is the
#                                    security boundary.
#   8883 (mTLS): clients authenticated via cert CN (use_identity_as_username);
#                matched against named "user <cn>" blocks below.
# First match wins within a user block.
# =============================================================================

# ---------------------------------------------------------------------------
# Anonymous (1883 internal-net services) — full access on the local broker.
# DO NOT expose 1883 outside the Docker network.
# ---------------------------------------------------------------------------
topic readwrite #

# ---------------------------------------------------------------------------
# Backend service account (named auth fallback if password_file is enabled)
# ---------------------------------------------------------------------------
user backend
topic readwrite #

# ---------------------------------------------------------------------------
# CV agent — publishes camera events and alerts
# ---------------------------------------------------------------------------
user cv-agent
topic write home/+/camera/event
topic write home/+/alert
topic read  home/+/sensors
topic read  $SYS/broker/uptime

# ---------------------------------------------------------------------------
# LLM / voice agent — publishes actions, reads events
# ---------------------------------------------------------------------------
user llm-agent
topic readwrite voice/command
topic readwrite agent/#
topic write     home/+/light
topic write     home/+/cmd
topic write     home/+/media/cmd
topic read      home/#
topic read      $SYS/broker/uptime

# ---------------------------------------------------------------------------
# ESP32 sensor nodes — per-room accounts (CN from mTLS cert = username)
# ---------------------------------------------------------------------------
user esp32-living-001
topic write home/living_room/sensors
topic write home/living_room/alert
topic read  home/living_room/cmd

user esp32-kitchen-001
topic write home/kitchen/sensors
topic write home/kitchen/alert
topic read  home/kitchen/cmd

user esp32-bedroom-001
topic write home/bedroom/sensors
topic write home/bedroom/alert
topic read  home/bedroom/cmd

# ---------------------------------------------------------------------------
# Mock sensors (dev machine) — full publish on all sensor/alert/camera topics
# CN=mock-sensors from the client cert generated by mock_sensors/setup_certs.sh
# ---------------------------------------------------------------------------
user mock-sensors
topic write home/+/sensors
topic write home/+/alert
topic write home/+/camera/event

# ---------------------------------------------------------------------------
# VPS bridge — read-only on non-sensitive topics, NO write to actuators
# This enforces §12.3 PROJECT.md: cloud has read access to T1/T2 events only.
# ---------------------------------------------------------------------------
user vps-bridge
topic read  home/+/alert
topic read  home/+/sensors
topic read  home/+/camera/event
# Explicitly deny actuator write (belt-and-suspenders: no write rule = denied)

# ---------------------------------------------------------------------------
# Monitoring exporter — read-only $SYS stats
# ---------------------------------------------------------------------------
user monitoring
topic read $SYS/#
