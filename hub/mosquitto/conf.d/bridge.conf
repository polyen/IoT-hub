# =============================================================================
# Mosquitto bridge configuration — edge → VPS
# Activated in T3.5 (mTLS + VPS ready).
#
# To activate:
#   1. Uncomment the block below.
#   2. Set VPS_MQTT_HOST in .env.
#   3. Run scripts/gen-mqtt-certs.sh to generate bridge client cert.
#   4. Uncomment `include_dir` in mosquitto.conf.
# =============================================================================

# connection iot-hub-vps-bridge
# address ${VPS_MQTT_HOST}:8883
#
# # mTLS client certificate (bridge identity)
# bridge_cafile   /mosquitto/certs/ca.crt
# bridge_certfile /mosquitto/certs/bridge-client.crt
# bridge_keyfile  /mosquitto/certs/bridge-client.key
# bridge_insecure false
#
# # Only forward T0/T1 topics to cloud (never T2+ — privacy invariant)
# topic iot/alert/# out 1
# topic iot/+/+/temperature out 1
# topic iot/+/+/humidity out 1
# topic iot/+/+/motion out 1
# # Receive commands from VPS
# topic iot/cmd/# in 1
#
# cleansession false
# start_type automatic
# restart_timeout 30
# keepalive_interval 60
#
# remote_username vps-bridge
# remote_password ${VPS_MQTT_BRIDGE_PASSWORD}
