###############################################################################
# MediaMTX — lightweight RTSP server for WiFi camera ingest
# Receives RTSP push from sender device; CV pipeline reads from this server.
#
# Sender pushes to:  rtsp://RPI_IP:8554/camera
# CV pipeline reads: rtsp://mediamtx:8554/camera  (via iot-internal network)
###############################################################################

logLevel: info
logDestinations: [stdout]

# Disable unused transports; HLS enabled for browser playback via nginx proxy
rtmp: false
webrtc: false
srt: false

readTimeout: 30s
writeTimeout: 30s
writeQueueSize: 1024

rtspAddress: :8554
hlsAddress: :8888

# REST API — used by healthcheck; bound to container-local only
api: true
apiAddress: :9997

# Auth: no credentials — T1 tier, LAN network boundary is the security perimeter.
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: publish
        path: ""
      - action: read
        path: ""
      - action: playback
        path: ""

paths:
  camera:
    # Source is configured via MTX_PATHS_CAMERA_SOURCE env var in docker-compose
    # so it can be set from .env without YAML variable substitution issues.
    # When CAMERA_RTSP_URL is unset, path is passive (accepts push from sender).
    sourceProtocol: tcp
    sourceOnDemand: false
