###############################################################################
# MediaMTX — lightweight RTSP server for WiFi camera ingest
# Receives RTSP push from sender device; CV pipeline reads from this server.
#
# Sender pushes to:  rtsp://RPI_IP:8554/camera
# CV pipeline reads: rtsp://mediamtx:8554/camera  (via iot-internal network)
###############################################################################

logLevel: info
logDestinations: [stdout]

# Disable unused transports; HLS kept as fallback, WebRTC is primary for low latency
rtmp: false
webrtc: true
srt: false

# WebRTC WHEP endpoint for browser playback (~200ms latency vs ~5s for HLS).
# webrtcICEUDPMuxAddress fixes all media on one UDP port so Docker port-mapping works.
# webrtcAdditionalHosts tells MediaMTX to advertise the RPi's LAN IP in ICE candidates
# (Docker container IP is unreachable from browser — host IP is needed).
webrtcAddress: :8889
webrtcLocalUDPAddress: :8889
webrtcAdditionalHosts:
  - ${RPI_IP}

readTimeout: 30s
writeTimeout: 30s
writeQueueSize: 1024

rtspAddress: :8554
hlsAddress: :8888

# Low-Latency HLS: 3 segments × 500ms + 200ms parts → ~1s live latency.
# Without these settings MediaMTX defaults to 7 × 1s segments (~7s delay).
# hlsPartDuration enables LL-HLS EXT-X-PART tags that hls.js lowLatencyMode needs.
hlsSegmentCount: 7
hlsSegmentDuration: 500ms
hlsPartDuration: 200ms

# REST API — used by healthcheck; bound to container-local only
api: true
apiAddress: :9997

# Auth: no credentials — T1 tier, LAN network boundary is the security perimeter.
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: publish
        path: ""
      - action: read
        path: ""
      - action: playback
        path: ""

paths:
  camera:
    # Source URL is pushed by the backend via PATCH /v3/config/paths/patch/camera
    # on startup and on every floor-plan save. When no source is set the path is
    # passive and accepts RTSP push from an external sender.
    # automatic: tries UDP first, falls back to TCP — tolerates home WiFi packet loss.
    sourceProtocol: automatic

  camera_hd:
    # High-resolution stream for frontend HLS/WebRTC viewing.
    # Source URL is pushed live by the backend via PATCH /v3/config/paths/patch/camera_hd
    # when the floor-plan is saved. sourceOnDemand is omitted — it only applies when a
    # static source URL is baked into this file, not when the backend sets it via the API.
    sourceProtocol: automatic
