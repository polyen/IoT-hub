###############################################################################
# MediaMTX — lightweight RTSP server for WiFi camera ingest
# Receives RTSP push from sender device; CV pipeline reads from this server.
#
# Sender pushes to:  rtsp://RPI_IP:8554/camera
# CV pipeline reads: rtsp://mediamtx:8554/camera  (via iot-internal network)
###############################################################################

logLevel: info
logDestinations: [stdout]

# Disable unused transports; HLS enabled for browser playback via nginx proxy
rtmp: false
webrtc: false
srt: false

readTimeout: 30s
writeTimeout: 30s
writeQueueSize: 1024

rtspAddress: :8554
hlsAddress: :8888

# REST API — used by healthcheck; bound to container-local only
api: true
apiAddress: :9997

# Auth: no credentials — T1 tier, LAN network boundary is the security perimeter.
authInternalUsers:
  - user: any
    pass: ""
    ips: []
    permissions:
      - action: publish
        path: ""
      - action: read
        path: ""
      - action: playback
        path: ""

paths:
  camera:
    # Pull from Reolink E1 Pro substream via TCP (more reliable over WiFi).
    # CV pipeline reads re-published stream from rtsp://mediamtx:8554/camera.
    # Browser gets HLS at /hls/camera/index.m3u8 via nginx proxy.
    source: ${CAMERA_RTSP_URL}
    sourceProtocol: tcp
    sourceOnDemand: false
