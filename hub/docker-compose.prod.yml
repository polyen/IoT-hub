# docker-compose.prod.yml — RPi5 production overrides (Hailo-8 HAT).
#
# Use alongside docker-compose.edge.yml:
#   docker compose -f hub/docker-compose.edge.yml -f hub/docker-compose.prod.yml up -d
# Or via make:
#   make up-edge-prod
#
# Strategy: mount hailo_platform and its libs into /hailo/ (isolated path),
# then expose them to Python via PYTHONPATH and to the linker via LD_LIBRARY_PATH.
# This avoids symlink issues (libhailort.so.X.Y.Z) and lib path conflicts.
#
# Assumptions (Raspberry Pi OS / Debian bookworm on aarch64):
#   hailo_platform  →  /usr/lib/python3/dist-packages/hailo_platform
#   hailo libs      →  /usr/lib/aarch64-linux-gnu/  (libhailort.so + versioned files)

services:
  cv:
    devices:
      - /dev/hailo0:/dev/hailo0
    volumes:
      - /usr/lib/python3/dist-packages/hailo_platform:/hailo/hailo_platform:ro
      - /usr/lib/aarch64-linux-gnu:/hailo/lib:ro
    environment:
      PYTHONPATH: /hailo
      LD_LIBRARY_PATH: /hailo/lib
