# docker-compose.prod.yml — RPi5 production overrides.
#
# On RPi5 the CV pipeline runs as a systemd service (scripts/iot-hub-cv.service)
# rather than in Docker, because hailo_platform has deep system-library ties
# (glibc/libstdc++ compiled for Debian Trixie) that conflict with standard
# Docker base images.
#
# Usage:
#   make up-edge-prod           — starts all edge services except cv
#   sudo systemctl start iot-hub-cv
#
# What this file does:
#   - Exposes mosquitto port 1883 on 127.0.0.1 (localhost only) so the host
#     CV systemd service can connect without mTLS.
#   - cv is excluded at the make level via --scale cv=0.

services:
  mosquitto:
    ports:
      # localhost-only plain MQTT for the host CV systemd service.
      # Not exposed on 0.0.0.0 — remains inaccessible from the network.
      - "127.0.0.1:1883:1883"
