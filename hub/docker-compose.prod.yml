# docker-compose.prod.yml — RPi5 production overrides (Hailo-8 HAT).
#
# Use alongside docker-compose.edge.yml:
#   docker compose -f hub/docker-compose.edge.yml -f hub/docker-compose.prod.yml up -d
# Or via make:
#   make up-edge-prod
#
# Strategy:
#   - hailo_platform (pure Python + cpython-313 .so) → /hailo/hailo_platform
#   - PYTHONPATH=/hailo so Python finds the package without touching the venv
#   - libhailort.so.4.23.0 mounted three times (unversioned, SONAME, full) so
#     the dynamic linker resolves all reference forms without following symlinks
#   - LD_LIBRARY_PATH=/hailo/lib — searched before container system libs
#
# Note: hailo_platform requires Python 3.13 (the .so is cpython-313).
# The cv Dockerfile uses python:3.13-slim-bookworm to match.

services:
  cv:
    devices:
      - /dev/hailo0:/dev/hailo0
    volumes:
      - /usr/lib/python3/dist-packages/hailo_platform:/hailo/hailo_platform:ro
      - /usr/lib/libhailort.so.4.23.0:/hailo/lib/libhailort.so.4.23.0:ro
      - /usr/lib/libhailort.so.4.23.0:/hailo/lib/libhailort.so.4:ro
      - /usr/lib/libhailort.so.4.23.0:/hailo/lib/libhailort.so:ro
      - /usr/lib/aarch64-linux-gnu/libstdc++.so.6.0.33:/hailo/lib/libstdc++.so.6.0.33:ro
      - /usr/lib/aarch64-linux-gnu/libstdc++.so.6.0.33:/hailo/lib/libstdc++.so.6:ro
    environment:
      PYTHONPATH: /hailo
      LD_LIBRARY_PATH: /hailo/lib
