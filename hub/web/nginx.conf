# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/hub.crt;
    ssl_certificate_key /etc/nginx/certs/hub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # ── WebSocket endpoints ─────────────────────────────────────────────────
    # Must come before the generic /api/ and /ws/ blocks.
    # Routes under /api/*/ws/* need explicit upgrade headers; routes under
    # /ws/* are caught by the /ws/ block below.

    location /api/agent/ws/ {
        # Variable + resolver (below) forces per-request DNS resolution so a
        # backend container recreated with a new IP doesn't strip a stale-IP 502.
        # Path is 1:1, so proxy_pass without a URI passes the original request URI.
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /api/system/ws {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
    }

    # ── WebSocket routes without /api/ prefix (/ws/events, /ws/confirm, /ws/cv/) ──
    location /ws/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Docker's embedded DNS — resolves upstream hostnames at request time, not at
    # nginx startup. Required when using variables in proxy_pass so that nginx
    # does not fail to start if mediamtx is not yet up, and tolerates restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── WebRTC WHEP signaling (primary, ~200ms latency) ─────────────────────
    location /whep/ {
        # Variable forces runtime DNS resolution via the resolver above.
        set $mediamtx_whep "http://mediamtx:8889";
        rewrite ^/whep/(.*) /$1 break;
        proxy_pass $mediamtx_whep;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "POST, OPTIONS, GET, PATCH, DELETE";
        add_header Access-Control-Allow-Headers "Content-Type, If-Match";
        add_header Access-Control-Expose-Headers "ETag, Link, Location";
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── HLS camera streams (fallback) ───────────────────────────────────────
    location /hls/ {
        set $mediamtx_hls "http://mediamtx:8888";
        rewrite ^/hls/(.*) /$1 break;
        proxy_pass $mediamtx_hls;
        proxy_http_version 1.1;
        # CRITICAL for LL-HLS: blocking playlist requests (?_HLS_msn=X&_HLS_part=Y)
        # must not be buffered — nginx must pass bytes to client as they arrive.
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
