# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/hub.crt;
    ssl_certificate_key /etc/nginx/certs/hub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # ── WebSocket endpoints ─────────────────────────────────────────────────
    # Must come before the generic /api/ and /ws/ blocks.
    # Routes under /api/*/ws/* need explicit upgrade headers; routes under
    # /ws/* are caught by the /ws/ block below.

    location /api/agent/ws/ {
        proxy_pass http://backend:8000/api/agent/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /api/system/ws {
        proxy_pass http://backend:8000/api/system/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    # ── WebSocket routes without /api/ prefix (/ws/events, /ws/confirm, /ws/cv/) ──
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── HLS camera streams ──────────────────────────────────────────────────
    location /hls/ {
        proxy_pass http://mediamtx:8888/;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
