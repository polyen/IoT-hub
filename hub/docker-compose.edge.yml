name: iot-hub-edge

services:
  # ---------------------------------------------------------------------------
  # MQTT broker (Mosquitto)
  # ---------------------------------------------------------------------------
  mosquitto:
    build:
      context: ..
      dockerfile: hub/mosquitto/Dockerfile
    container_name: mosquitto
    restart: unless-stopped
    ports:
      # 1883 bound to loopback only — the iot-hub-cv systemd service runs on
      # the host and needs plain MQTT access without mTLS. Binding to 127.0.0.1
      # keeps 1883 off the LAN; the Docker-network security boundary is intact.
      - "127.0.0.1:1883:1883"
      - "8883:8883"   # mTLS (T3.1)
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - mosquitto-certs:/mosquitto/config/certs   # named volume; entrypoint generates certs on first start
      - ./mosquitto/conf.d:/mosquitto/config/conf.d:ro
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t '_health' -m '' -q 0 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL (+ TimescaleDB + pgvector via T0.5)
  # ---------------------------------------------------------------------------
  # timescaledb-ha runs as postgres (uid 1000) and expects the data directory
  # to be owned by 1000:1000. Docker named volumes are created root:root, so
  # after every reboot the ownership is wrong. This init container fixes it
  # once before postgres starts.
  postgres-init:
    image: busybox
    user: root
    volumes:
      - pgdata:/home/postgres/pgdata/data
    command: ["chown", "-R", "1000:1000", "/home/postgres/pgdata/data"]
    restart: "no"

  postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: postgres
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iothub}
      POSTGRES_USER: ${POSTGRES_USER:-iothub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/home/postgres/pgdata/data
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-iothub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (cache + pub/sub bridge buffer)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      # Loopback-only — the iot-hub-cv systemd service runs on the host and
      # needs direct Redis access for face embedding caching (/api/cv/enroll).
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Backend (FastAPI — stub until T1.x)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: hub/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-iothub}?ssl=disable
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ModelStore writes the active symlink + history into this directory and
      # then issues `docker kill --signal=SIGHUP <container>` via the bound socket.
      MODELS_DIR: /app/models
      CV_CONTAINER: cv
      VOICE_CONTAINER: voice
      DEPLOY_TOKEN: ${DEPLOY_TOKEN:?DEPLOY_TOKEN is required}
      # Directory inside the container where manually-annotated frames are saved.
      # Override ANNOTATION_HOST_DIR in .env to bind-mount a host path (e.g. SSD)
      # so annotated data is accessible outside the container for rsync / DVC sync.
      ANNOTATION_DATASET_DIR: ${ANNOTATION_DATASET_DIR:-/app/annotation-dataset}
    volumes:
      # Read-write so promote() can swap the active_{kind}.hef symlink and
      # append to deployments.json; the underlying versions/ tree is bind-mounted
      # from the SSD (immutable artifacts pushed via DVC / SCP).
      - ${MODELS_HOST_DIR:-/opt/iot-hub/models}:/app/models
      # Read-only socket so backend can SIGHUP the cv/voice containers. The
      # bind is :ro at the OS level; Docker still requires the docker.sock
      # GID to be exposed to appuser inside the container — see ``group_add``.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ANNOTATION_HOST_DIR:-annotation-dataset}:${ANNOTATION_DATASET_DIR:-/app/annotation-dataset}
    # appuser inside the container must be able to read the docker socket on
    # the host. The host docker group GID is passed at runtime via env so the
    # compose file stays portable across hosts (RPi5 usually 988; varies).
    group_add:
      - "${DOCKER_GID:-988}"
    ports:
      - "8000:8000"   # FastAPI / metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Mosquitto exporter (MQTT metrics for Prometheus)
  # ---------------------------------------------------------------------------
  mosquitto-exporter:
    image: jnovack/mosquitto-exporter:latest
    container_name: mosquitto-exporter
    restart: unless-stopped
    environment:
      BROKER_ENDPOINT: tcp://mosquitto:1883
    ports:
      - "9234:9234"
    depends_on:
      - mosquitto
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # PostgreSQL exporter (DB metrics for Prometheus)
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-iothub}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Node exporter (host OS metrics for Prometheus)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # MediaMTX — RTSP server that receives WiFi camera push and re-streams it
  # to the CV pipeline. Sender (laptop/phone) pushes to rtsp://RPI_IP:8554/camera.
  # ---------------------------------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:1.11.3
    container_name: mediamtx
    restart: unless-stopped
    environment:
      # Camera stream sources are NOT configured here — they live in DevicePlacement.config
      # (set via the floor-plan editor) and are pushed to mediamtx by the backend on
      # startup and on every floor-plan save. No CAMERA_RTSP_URL env var needed.
      # RPI_IP is injected into mediamtx.yml for webrtcAdditionalHosts so the browser
      # can reach the container over WebRTC (Docker internal IP is not reachable).
      RPI_IP: ${RPI_IP:?RPI_IP must be set in .env (e.g. RPI_IP=192.168.1.100)}
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP — exposed to LAN so sender device can reach it
      - "8889:8889/udp"  # WebRTC ICE media (muxed on single port for Docker)
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9997/v3/paths/list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # CV pipeline (stub — T2.x)
  # ---------------------------------------------------------------------------
  cv:
    build:
      context: ..
      dockerfile: hub/edge/cv/Dockerfile
    container_name: cv
    restart: unless-stopped
    environment:
      # When RTSP_URL is not set, default to the mediamtx stream pushed by the
      # WiFi camera sender (scripts/wifi_stream_sender.sh).
      RTSP_URL: ${RTSP_URL:-rtsp://mediamtx:8554/camera}
      REDIS_URL: redis://redis:6379/0
      # Resolved at runtime via the symlinks ModelStore manages.
      HEF_PATH: /app/models/current_yolo.hef
      POSE_HEF_PATH: /app/models/current_pose.hef
      FACE_HEF_PATH: /app/models/current_face.hef
      FACE_EMBEDDINGS_PATH: /app/models/embeddings.pkl
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # T0 frame storage path — must match the volume target below so that
      # frame_blob_ref paths stored in the DB are valid on the host too
      # (training/mining.py reads frames directly from the host path).
      # Dev default: named volume "t0-frames" mounted at /mnt/t0-frames.
      # Production: set T0_HOST_DIR=/mnt/ssd/edge-data in .env to use the
      # real SSD; Docker bind-mounts it at the same path inside the container.
      T0_MOUNT: ${T0_HOST_DIR:-/mnt/t0-frames}
    volumes:
      # Read-only — only the backend's ModelStore writes here. cv just opens
      # the symlinks for inference and reacts to SIGHUP to reload.
      - ${MODELS_HOST_DIR:-/opt/iot-hub/models}:/app/models:ro
      # T0 frame ring-buffer.
      # Dev (T0_HOST_DIR not set): named volume — passes mount check because
      #   Docker volumes are proper mount points inside the container.
      # Prod (T0_HOST_DIR=/mnt/ssd/edge-data): bind mount at the same path,
      #   so frame_blob_ref paths are identical on host and in container.
      - ${T0_HOST_DIR:-t0-frames}:${T0_HOST_DIR:-/mnt/t0-frames}
    # Hailo HAT requires /dev/hailo0; declare it as an override in
    # docker-compose.prod.yml on the RPi5 so dev/CI machines without HailoRT
    # can still bring the compose up. The cv pipeline degrades gracefully
    # when hailo_platform is unavailable.
    ports:
      - "8002:8002"
    depends_on:
      - mosquitto
      - mediamtx
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Voice pipeline (VAD → wake-word → Moonshine STT → MQTT + TTS responder)
  # ---------------------------------------------------------------------------
  voice:
    build:
      context: ..
      dockerfile: hub/edge/voice/Dockerfile
    container_name: voice
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-iothub}?ssl=disable
      # UsefulSensors/moonshine-tiny-uk has no ONNX export; leave empty to use
      # Hailo Whisper (multilingual) on RPi or faster-whisper on dev machines.
      MOONSHINE_MODEL: ${MOONSHINE_MODEL:-}
      FASTER_WHISPER_MODEL: ${FASTER_WHISPER_MODEL:-base}
      WAKE_WORD_MODEL_PATH: ${WAKE_WORD_MODEL_PATH:-}
      FORCE_CPU_STT: ${FORCE_CPU_STT:-false}
      # Hailo Whisper (preferred on RPi5+Hailo-8): tiny (10s window) or base (5s).
      WHISPER_VARIANT: ${WHISPER_VARIANT:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-uk}
      WHISPER_ASSETS_DIR: /app/.whisper_cache
      NPU_STRATEGY: ${NPU_STRATEGY:-whisper_waits}
      PIPER_MODEL: ${PIPER_MODEL:-uk_UA-lada-x_low}
      PIPER_MODEL_DIR: /app/piper-models
      # HF model cache — shared with hf-cache volume so faster-whisper survives rebuilds.
      HF_HOME: /app/.hf_cache
    volumes:
      # Wake-word and STT models — read-only, written by ModelStore.
      - ${MODELS_HOST_DIR:-/opt/iot-hub/models}:/app/models:ro
      # Piper TTS voice models — persisted across rebuilds.
      - piper-models:/app/piper-models
      # HuggingFace model cache (faster-whisper downloads here on first start).
      - hf-cache:/app/.hf_cache
      # Hailo Whisper assets (HEFs + npy + mel filters) — ~140 MB for tiny.
      # Lazy-downloaded on first transcribe call.
      - whisper-cache:/app/.whisper_cache
    # sounddevice needs access to the host ALSA/sound subsystem.
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Local LLM (Qwen 2.5 3B Instruct Q4_K_M via llama-cpp-python)
  # ---------------------------------------------------------------------------
  llm:
    build:
      context: ..
      dockerfile: hub/edge/agent/Dockerfile.llm
    container_name: llm
    restart: unless-stopped
    volumes:
      # LLM GGUF weights live under the same models tree as HEF artifacts so
      # backups and the auto-updater treat them uniformly.
      - ${MODELS_HOST_DIR:-/opt/iot-hub/models}/llm:/app/models
    environment:
      MODEL_URL: ${LLM_MODEL_URL:-https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf}
      MODEL_PATH: /app/models/qwen2.5-3b-instruct-q4_k_m.gguf
      MODEL_SHA256: ${LLM_MODEL_SHA256:-}
      N_CTX: ${LLM_N_CTX:-8192}
      N_THREADS: ${LLM_N_THREADS:-6}
    ports:
      - "8001:8001"
    mem_limit: 6g
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # ntfy (push notifications)
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.22.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8080}
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ntfy-data:/var/cache/ntfy
      - ntfy-etc:/etc/ntfy
    ports:
      - "8080:80"
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Web PWA (served via nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: hub/web/Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certificate generated by scripts/gen-web-cert.sh
      - ${CERTS_HOST_DIR:-/opt/iot-hub/certs}:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_started
      # mediamtx is NOT a hard dependency: nginx already handles mediamtx being
      # temporarily down (resolver+variable in /whep/ and /hls/ locations).
      # Keeping a service_started (not service_healthy) guard just ensures the
      # mediamtx container object exists so Docker DNS resolves the hostname.
      mediamtx:
        condition: service_started
    networks:
      - iot-internal

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:
  mosquitto-certs:
  redis-data:
  prometheus-data:
  grafana-data:
  ntfy-data:
  ntfy-etc:
  # llm-models removed: LLM weights now live in the same host-mounted models
  # tree (${MODELS_HOST_DIR}/llm) as HEFs for uniform backup/sync.
  piper-models:
  hf-cache:
  whisper-cache:
  t0-frames:
  annotation-dataset:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  iot-internal:
    # internal:false (plan T0.4 originally said true) — required because the
    # MQTT bridge must reach ${VPS_MQTT_HOST}, ntfy must reach the cloud relay,
    # the LLM container downloads its GGUF from HuggingFace on first start, and
    # backend egress to ntfy is needed for push. Privacy invariants are
    # enforced at higher layers (LUKS for T0, PG publication WHERE filter for
    # T1/T2, MQTT bridge topic allowlist) — not by network isolation.
    internal: false
