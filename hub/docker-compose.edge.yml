name: iot-hub-edge

services:
  # ---------------------------------------------------------------------------
  # MQTT broker (Mosquitto)
  # ---------------------------------------------------------------------------
  mosquitto:
    build:
      context: ..
      dockerfile: hub/mosquitto/Dockerfile
    container_name: mosquitto
    restart: unless-stopped
    ports:
      # 1883 is intentionally NOT mapped to the host — the iot-internal Docker
      # network is the security boundary for plain MQTT. Cross-host clients
      # (ESP32 sensors, VPS bridge) MUST use 8883 with mTLS.
      - "8883:8883"   # mTLS (T3.1)
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
      - mosquitto-certs:/mosquitto/config/certs   # named volume; entrypoint generates certs on first start
      - ./mosquitto/conf.d:/mosquitto/config/conf.d:ro
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t '_health' -m '' -q 0 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL (+ TimescaleDB + pgvector via T0.5)
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iothub}
      POSTGRES_USER: ${POSTGRES_USER:-iothub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/home/postgres/pgdata/data
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-iothub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (cache + pub/sub bridge buffer)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Backend (FastAPI — stub until T1.x)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: hub/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-iothub}?ssl=disable
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"   # FastAPI / metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Mosquitto exporter (MQTT metrics for Prometheus)
  # ---------------------------------------------------------------------------
  mosquitto-exporter:
    image: jnovack/mosquitto-exporter:latest
    container_name: mosquitto-exporter
    restart: unless-stopped
    environment:
      BROKER_ENDPOINT: tcp://mosquitto:1883
    ports:
      - "9234:9234"
    depends_on:
      - mosquitto
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # PostgreSQL exporter (DB metrics for Prometheus)
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-iothub}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Node exporter (host OS metrics for Prometheus)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # CV pipeline (stub — T2.x)
  # ---------------------------------------------------------------------------
  cv:
    build:
      context: ..
      dockerfile: hub/edge/cv/Dockerfile
    container_name: cv
    restart: unless-stopped
    environment:
      RTSP_URL: ${RTSP_URL:-rtsp://camera.local:554/stream}
    ports:
      - "8002:8002"
    depends_on:
      - mosquitto
    networks:
      - iot-internal

  # ---------------------------------------------------------------------------
  # Local LLM (Qwen 3.5 4B Q4_K_M via llama-cpp-python)
  # ---------------------------------------------------------------------------
  llm:
    build:
      context: ..
      dockerfile: hub/edge/agent/Dockerfile.llm
    container_name: llm
    restart: unless-stopped
    volumes:
      - llm-models:/app/models
    ports:
      - "8001:8001"
    mem_limit: 4g
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # ntfy (push notifications)
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.22.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8080}
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ntfy-data:/var/cache/ntfy
      - ntfy-etc:/etc/ntfy
    ports:
      - "8080:80"
    networks:
      - iot-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Web PWA (served via nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: hub/web/Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - iot-internal

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:
  mosquitto-certs:
  redis-data:
  prometheus-data:
  grafana-data:
  ntfy-data:
  ntfy-etc:
  llm-models:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  iot-internal:
    # internal:false (plan T0.4 originally said true) — required because the
    # MQTT bridge must reach ${VPS_MQTT_HOST}, ntfy must reach the cloud relay,
    # the LLM container downloads its GGUF from HuggingFace on first start, and
    # backend egress to ntfy is needed for push. Privacy invariants are
    # enforced at higher layers (LUKS for T0, PG publication WHERE filter for
    # T1/T2, MQTT bridge topic allowlist) — not by network isolation.
    internal: false
