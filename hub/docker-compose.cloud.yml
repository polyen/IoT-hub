name: iot-hub-cloud

services:
  # ---------------------------------------------------------------------------
  # Mosquitto VPS broker — accepts mTLS bridge from edge (T3.4)
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto-cloud
    restart: unless-stopped
    ports:
      - "8883:8883"   # mTLS for edge bridge
    volumes:
      - mosquitto-cloud-data:/mosquitto/data
      - mosquitto-cloud-log:/mosquitto/log
      - ./mosquitto/mosquitto-cloud.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/config/certs:ro
    networks:
      - cloud-internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -t '_health' -m '' -q 0 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL replica (non-sensitive aggregations only — T0/T1 tier data)
  # ---------------------------------------------------------------------------
  postgres-replica:
    image: timescale/timescaledb-ha:pg16
    container_name: postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iothub}
      POSTGRES_USER: ${POSTGRES_USER:-iothub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata-cloud:/home/postgres/pgdata/data
    networks:
      - cloud-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-iothub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Telegram bot (T4.1 — HITL feedback via inline keyboard)
  # ---------------------------------------------------------------------------
  telegram-bot:
    build:
      context: ..
      dockerfile: hub/cloud/Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:?TELEGRAM_TOKEN is required}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:?TELEGRAM_WEBHOOK_URL is required}
      EDGE_API_URL: ${EDGE_API_URL:-http://backend:8000}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres-replica:5432/${POSTGRES_DB:-iothub}
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres-replica:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - cloud-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Grafana (cloud dashboards — non-sensitive metrics only)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.6.1
    container_name: grafana-cloud
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - cloud-internal

  # ---------------------------------------------------------------------------
  # MLflow tracking server (T4.3)
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-iothub}:${POSTGRES_PASSWORD:?}@postgres-replica:5432/${POSTGRES_DB:-iothub} --default-artifact-root /mlflow/artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: ""
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres-replica:
        condition: service_healthy
    networks:
      - cloud-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # ntfy (cloud relay for push notifications)
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy-cloud
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:?NTFY_BASE_URL is required}
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ntfy-data:/var/cache/ntfy
      - ntfy-etc:/etc/ntfy
    ports:
      - "8080:80"
    networks:
      - cloud-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata-cloud:
  mosquitto-cloud-data:
  mosquitto-cloud-log:
  grafana-data:
  ntfy-data:
  ntfy-etc:
  mlflow-artifacts:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  cloud-internal:
    internal: false
