# Regression bench override — pin LLM to PREVIOUS baseline (Qwen 2.5 3B).
#
# Migration trail (2026-05):
#   Qwen 3.5 4B (initial)  →  Qwen 2.5 3B (revert)  →  Qwen 2.5 1.5B (downsize)
#
# Current default in docker-compose.edge.yml = Qwen 2.5 1.5B (the speed win).
# This override pins it back to 3B for A/B regression of accuracy / quality
# claims when we want to confirm the smaller model isn't worse on a given
# eval set (LLM-optimization research, Variant B).
#
# Usage (on RPi 5):
#   docker compose -f hub/docker-compose.edge.yml \
#                  -f hub/docker-compose.bench.yml \
#                  up -d --build llm
#
# This overrides only the llm service; all other services stay as-is.
# Both GGUF files coexist in the llm-models volume — switching back to the
# default 1.5B (no override) does NOT redownload.

name: iot-hub-edge

services:
  llm:
    environment:
      MODEL_URL: "https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf"
      MODEL_PATH: "/app/models/qwen2.5-3b-instruct-q4_k_m.gguf"
      N_CTX: "4096"
      N_THREADS: "4"
    mem_limit: 4g
