# Phase 0 bench override — swap LLM container to Qwen3.5-4B candidate.
#
# Usage (on RPi 5):
#   docker compose -f hub/docker-compose.edge.yml \
#                  -f hub/docker-compose.bench.yml \
#                  up -d --build llm
#
# This overrides only the llm service; all other services stay as-is.
# The model downloads to the same llm-models volume under a different filename,
# so baseline (qwen2.5-3b-instruct-q4_k_m.gguf) is NOT deleted.

name: iot-hub-edge

services:
  llm:
    environment:
      MODEL_URL: "https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/resolve/main/Qwen3.5-4B-Q4_K_M.gguf"
      MODEL_PATH: "/app/models/qwen3.5-4b-q4_k_m.gguf"
      N_CTX: "8192"
      N_THREADS: "6"
    mem_limit: 6g
