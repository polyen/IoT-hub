# Regression bench override — load PREVIOUS baseline Qwen 2.5 3B Instruct.
#
# Phase 0 (May 2026) validated Qwen 3.5 4B as new production primary, so this
# override is now inverted: it pins the LLM container BACK to the qwen2.5-3b
# baseline for regression re-runs / comparative benchmarks against the new
# default.
#
# Usage (on RPi 5):
#   docker compose -f hub/docker-compose.edge.yml \
#                  -f hub/docker-compose.bench.yml \
#                  up -d --build llm
#
# This overrides only the llm service; all other services stay as-is.
# Both GGUF files coexist in the llm-models volume — switching back to the
# Qwen 3.5 4B default (no override) does NOT redownload.

name: iot-hub-edge

services:
  llm:
    environment:
      MODEL_URL: "https://huggingface.co/Qwen/Qwen2.5-3B-Instruct-GGUF/resolve/main/qwen2.5-3b-instruct-q4_k_m.gguf"
      MODEL_PATH: "/app/models/qwen2.5-3b-instruct-q4_k_m.gguf"
      N_CTX: "4096"
      N_THREADS: "4"
    mem_limit: 4g
