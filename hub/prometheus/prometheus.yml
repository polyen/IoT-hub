global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: mosquitto
    static_configs:
      - targets: ["mosquitto-exporter:9234"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cv_pipeline
    # CV serves Prometheus metrics on :8002 (METRICS_PORT default), NOT :8001
    # (that's the LLM service). In prod CV runs as a host systemd service (the
    # `cv` container is scaled to 0), so the Docker DNS name `cv` does not
    # resolve — scrape the host instead via host.docker.internal. This also
    # works for a dev/container CV, which publishes 8002 to the host. Requires
    # `extra_hosts: host.docker.internal:host-gateway` on the prometheus service.
    static_configs:
      - targets: ["host.docker.internal:8002"]
    metrics_path: /metrics

  - job_name: cv_shadow
    # The shadow CV runner (hub.edge.mlops.shadow_runner) emits iot_hub_shadow_*
    # on :8003. It is launched on the host on-demand during a canary/shadow
    # evaluation of a candidate model, so this target is DOWN (no series) unless
    # a shadow run is active — that is expected. Feeds the Shadow vs Active
    # dashboard. Same host-scrape rationale as cv_pipeline.
    static_configs:
      - targets: ["host.docker.internal:8003"]
    metrics_path: /metrics
