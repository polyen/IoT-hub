repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "^.*\\.md$"
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: "^uv\\.lock$"
      - id: debug-statements

  # Keep these revs in sync with the ruff/black versions pinned in uv.lock —
  # CI runs `ruff check` + `black --check` at those versions, so an older hook
  # here will reformat code into a layout CI then rejects (e.g. isort import
  # ordering flip-flops).  CI does NOT run `ruff format`; black is the formatter
  # of record, so we don't enable the ruff-format hook (two formatters fight).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: local
    hooks:
      - id: no-raw-datasets
        name: Block raw files in datasets/
        language: python
        entry: python scripts/check_datasets.py
        pass_filenames: true
        types: [file]
